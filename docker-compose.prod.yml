services:
  mysql:
    image: mysql:8.0
    container_name: blog-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-666}
      MYSQL_DATABASE: blog
      TZ: Asia/Shanghai
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./blog-backend/sql:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - blog-net

  redis:
    image: redis:7-alpine
    container_name: blog-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - blog-net

  backend:
    image: ghcr.io/mofishx/yblog-backend:latest
    container_name: blog-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/blog?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-666}
      SPRING_DATA_REDIS_HOST: redis
      SERVER_PORT: "8080"
      AI_BASE_URL: ${AI_BASE_URL:-https://api.deepseek.com}
      AI_API_KEY: ${AI_API_KEY:-}
      AI_MODEL: ${AI_MODEL:-deepseek-chat}
      AI_MAX_TOKENS: ${AI_MAX_TOKENS:-1024}
      AI_TEMPERATURE: ${AI_TEMPERATURE:-0.3}
      AI_ENABLED: ${AI_ENABLED:-true}
      OSS_QINIU_ACCESS_KEY_ID: ${OSS_QINIU_ACCESS_KEY_ID:-}
      OSS_QINIU_ACCESS_KEY_SECRET: ${OSS_QINIU_ACCESS_KEY_SECRET:-}
      OSS_QINIU_BUCKET_NAME: ${OSS_QINIU_BUCKET_NAME:-}
      EMAIL_RESEND_API_KEY: ${EMAIL_RESEND_API_KEY:-}
    ports:
      - "${BACKEND_PORT:-8085}:8080"
    networks:
      - blog-net

  frontend:
    image: ghcr.io/mofishx/yblog-frontend:latest
    container_name: blog-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-80}:80"
    networks:
      - blog-net

volumes:
  mysql_data:
  redis_data:

networks:
  blog-net:
    driver: bridge
