services:
  mysql:
    image: mysql:8.0
    container_name: blog-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-yblog}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-}
      TZ: Asia/Shanghai
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - blog-net

  redis:
    image: redis:7-alpine
    container_name: blog-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - blog-net

  backend:
    image: ghcr.io/mofishx/yblog-backend:latest
    build:
      context: ./blog-backend
      dockerfile: Dockerfile
    container_name: blog-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      # AI Model
      AI_BASE_URL: ${AI_BASE_URL:-https://api.deepseek.com}
      AI_API_KEY: ${AI_API_KEY:-}
      AI_MODEL: ${AI_MODEL:-deepseek-chat}
      AI_MAX_TOKENS: ${AI_MAX_TOKENS:-1024}
      AI_TEMPERATURE: ${AI_TEMPERATURE:-0.3}
      AI_ENABLED: ${AI_ENABLED:-true}
      # OSS
      OSS_QINIU_ACCESS_KEY_ID: ${OSS_QINIU_ACCESS_KEY_ID:-}
      OSS_QINIU_ACCESS_KEY_SECRET: ${OSS_QINIU_ACCESS_KEY_SECRET:-}
      OSS_QINIU_BUCKET_NAME: ${OSS_QINIU_BUCKET_NAME:-}
      # Email
      EMAIL_RESEND_API_KEY: ${EMAIL_RESEND_API_KEY:-}
      # JWT
      JWT_SECRET: ${JWT_SECRET:-}
      JWT_ACCESS_TOKEN_EXPIRATION: ${JWT_ACCESS_TOKEN_EXPIRATION:-300}
      JWT_REFRESH_TOKEN_EXPIRATION: ${JWT_REFRESH_TOKEN_EXPIRATION:-2592000}
      # MySQL
      MYSQL_HOST: ${MYSQL_HOST:-blog-mysql}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-}
      # Redis
      REDIS_HOST: ${REDIS_HOST:-blog-redis}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      # Domain
      APP_DOMAIN: ${APP_DOMAIN:-}
      APP_URL: ${APP_URL:-}
    networks:
      - blog-net

  frontend:
    image: ghcr.io/mofishx/yblog-frontend:latest
    build:
      context: ./front
      dockerfile: Dockerfile
    container_name: blog-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${PORT:-80}:80"
    networks:
      - blog-net

volumes:
  mysql_data:
  redis_data:

networks:
  blog-net:
    driver: bridge
