version: "3.8"

services:
  backend:
    build:
      context: ./blog-backend
      dockerfile: blog-server/Dockerfile
    container_name: blog-backend
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - MYSQL_HOST=mysql
      - MYSQL_USER=root
      - MYSQL_PASSWORD=${MYSQL_ROOT_PASSWORD:-root}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=
      - JWT_SECRET=${JWT_SECRET}
      - AI_API_KEY=${DEEPSEEK_API_KEY:-}
      - OSS_QINIU_ACCESS_KEY_ID=${QINIU_ACCESS_KEY:-}
      - OSS_QINIU_ACCESS_KEY_SECRET=${QINIU_SECRET_KEY:-}
      - OSS_QINIU_BUCKET_NAME=${QINIU_BUCKET_NAME:-}
      - EMAIL_RESEND_API_KEY=${RESEND_API_KEY:-}
    ports:
      - "8080:8080"
