server:
  port: 1145

spring:
  datasource:
    url: jdbc:mysql://${MYSQL_HOST}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:yblog}?useSSL=true&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: ${MYSQL_ROOT_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD}

logging:
  level:
    com.yvmoux.blog: info
ai:
  base-url: https://api.deepseek.com
  api-key:
  model: deepseek-chat
  max-tokens: 1024
  temperature: 0.3
  enabled: true

storage:
  # 储存类型 local oss
  type: ${STORAGE_TYPE:local}

  # 本地储存路径（仅在本地储存时生效）
  local:
    path: ${LOCAL_STORAGE_PATH:/uploads}

  # 七牛云储存（仅在七牛云储存时生效）
  oss:
    endpoint: https://cdn.yvmou.cn
    access-key-id: BmDQIcudJIP_FCKyoC0KmgeELAv_E9UGjHXHZ8Qi
    access-key-secret: imrt2rI3j6mZAAxWQ59VoAv12zKx03kGWBM0R__y
    bucket-name: yvmoublog

email:
  resend:
    api-key: ${EMAIL_RESEND_API_KEY}

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

jwt:
  secret: ${JWT_SECRET}
  access-token-expiration: ${JWT_ACCESS_TOKEN_EXPIRATION:300}
  refresh-token-expiration: ${JWT_REFRESH_TOKEN_EXPIRATION:2592000}

app:
  domain: ${APP_DOMAIN:}
  frontend-url: ${APP_URL:http://localhost:5173}