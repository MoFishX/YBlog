server:
  port: 1145

spring:
  datasource:
    url: jdbc:mysql://${MYSQL_HOST}:${MYSQL_PORT:3306}/root?useSSL=true&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: ${MYSQL_ROOT_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD}

logging:
  level:
    com.yvmoux.blog: info
ai:
  base-url: https://api.deepseek.com
  api-key:
  model: deepseek-chat
  max-tokens: 1024
  temperature: 0.3
  enabled: true

oss:
  qiniu:
    access-key-id:
    access-key-secret:
    bucket-name:
email:
  resend:
    api-key:

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

jwt:
  secret: ${JWT_SECRET}
  access-token-expiration: ${JWT_ACCESS_TOKEN_EXPIRATION:300}
  refresh-token-expiration: ${JWT_REFRESH_TOKEN_EXPIRATION:2592000}